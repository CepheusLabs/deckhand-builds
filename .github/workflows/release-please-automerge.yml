name: Auto-merge Release Please PR

# Release Please opens "chore(main): release X.Y.Z" PRs. By default they
# sit open until a human merges them. This workflow enables GitHub's
# native auto-merge on those PRs so they merge themselves as soon as
# required status checks pass. The PR still exists as the canonical
# changelog artifact — it just doesn't require a manual click.
#
# To disable: delete this file. Release Please PRs will then sit open
# until merged manually.

on:
  pull_request_target:
    types: [opened, reopened, labeled, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Enable auto-merge on release PRs
    if: |
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      contains(github.event.pull_request.labels.*.name, 'autorelease: pending')
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (merge commit)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --merge --auto "$PR_URL"
