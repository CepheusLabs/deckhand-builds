name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # PAT so future tag/release events (if any downstream workflow
          # wires onto them) can fire. Falls back to GITHUB_TOKEN when
          # RELEASE_PLEASE_TOKEN isn't configured.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

      - name: Summary
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          echo "Tagged ${{ steps.release.outputs.tag_name }}."
          echo "Deckhand (the tool) now refers to this tag when fetching profiles."
