name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install yamllint
        run: pipx install yamllint

      - name: Lint every YAML under the repo
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: disable}}' \
            registry.yaml printers/*/profile.yaml

  profile-structure:
    name: Profile directory structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Every printer has a profile.yaml and README
        run: |
          fail=0
          for d in printers/*/; do
            id=$(basename "$d")
            for required in profile.yaml README.md; do
              if [ ! -f "$d$required" ]; then
                echo "::error::$d is missing $required"
                fail=1
              fi
            done
          done
          exit $fail

      - name: registry.yaml lists every printers/* directory
        run: |
          python3 <<'PY'
          import pathlib, re, sys
          import yaml
          reg = yaml.safe_load(open("registry.yaml"))
          listed = {p["id"] for p in reg.get("profiles", [])}
          on_disk = {d.name for d in pathlib.Path("printers").iterdir() if d.is_dir()}
          missing_in_registry = on_disk - listed
          missing_on_disk = listed - on_disk
          ok = True
          if missing_in_registry:
              print(f"::error::printers/ has profiles not listed in registry.yaml: {sorted(missing_in_registry)}")
              ok = False
          if missing_on_disk:
              print(f"::error::registry.yaml lists profiles that don't exist on disk: {sorted(missing_on_disk)}")
              ok = False
          sys.exit(0 if ok else 1)
          PY

  # Validate every profile.yaml against schema/profile.schema.json using
  # the Python `jsonschema` reference implementation (Draft 2020-12).
  # No external binary needed — keeps this repo's CI self-contained.
  schema-validate:
    name: Validate against profile.schema.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install validator deps
        run: pipx install --include-deps 'jsonschema[format]' && pip install pyyaml

      - name: Validate every profile.yaml
        run: |
          python3 <<'PY'
          import json, pathlib, sys
          import yaml
          import jsonschema
          from jsonschema import Draft202012Validator

          schema = json.loads(pathlib.Path("schema/profile.schema.json").read_text())
          Draft202012Validator.check_schema(schema)
          validator = Draft202012Validator(schema)

          failed = 0
          for profile_path in sorted(pathlib.Path("printers").glob("*/profile.yaml")):
              doc = yaml.safe_load(profile_path.read_text())
              # Stub profiles are intentionally incomplete placeholders —
              # skip strict validation until they're promoted to alpha.
              if (doc or {}).get("status") == "stub":
                  print(f"skip (stub): {profile_path}")
                  continue
              errors = sorted(validator.iter_errors(doc), key=lambda e: e.path)
              if errors:
                  failed += 1
                  print(f"::error file={profile_path}::{len(errors)} schema error(s):")
                  for err in errors:
                      path = "/".join(str(p) for p in err.absolute_path) or "<root>"
                      print(f"  - at '{path}': {err.message}")
              else:
                  print(f"ok: {profile_path}")
          sys.exit(1 if failed else 0)
          PY
